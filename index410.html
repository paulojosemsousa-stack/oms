let _supa=null;
function initSupa(url,key){
  try{
    _supa=window.supabase.createClient(url.trim(),key.trim(),{auth:{persistSession:true,autoRefreshToken:true,storageKey:'tmaster_auth'}});
    try{localStorage.setItem(TM_SU,url.trim());localStorage.setItem(TM_SK,key.trim());}catch(e){}
    return _supa;
  }catch(e){console.error('[TM] Supabase init:',e);return null;}
}

    const k=localStorage.getItem(TM_SK)||_DK;
    if(u&&k)initSupa(u,k);

async function supaLoad(cid){
  if(!_supa||!cid)return null;
  const{data,error}=await _supa.from('tm_state').select('data_key,data').eq('company_id',cid);
  if(error){console.warn('[TM] load:',error.message);return null;}
  return Object.fromEntries(data.map(r=>[r.data_key,r.data]));
}
function supaSave(cid,key,val){
  if(!_supa||!cid)return;
  _supa.from('tm_state').upsert({id:cid+'::'+key,company_id:cid,data_key:key,data:val,updated_at:new Date().toISOString()})
    .then(({error})=>{if(error)console.warn('[TM] save:',key,error.message);});
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function uid(){return"id"+Date.now()+Math.random().toString(36).slice(2,6);}
function fmt(n){return typeof n==="number"?n.toLocaleString("pt-BR"):"—";}
function fmtR(n){return typeof n==="number"?n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return"—";const p=d.split("-");return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d;}
function getTT(tireTypes,code){return tireTypes.find(t=>t.code===code)||tireTypes[0]||{recapKm:100000,minSulco:4,name:"?",code:"?",color:"#888"};}
function gts(tire,tt,odo){
  if(!tire||!tire.serial)return"empty";
  if(tire.condition==="critico")return"critical";
  if(tire.condition==="atencao")return"warning";
  if(!tt)return"ok";
  const rc=Math.min(tire.recapCount||0,RF.length-1),f=RF[rc];
  const th=tt.recapKm*f,u=Math.max(0,(odo||0)-(tire.kmInstalled||0));
  return(th-u)<=0?"critical":(th-u)<=WARN_KM?"warning":"ok";
}
function gkl(tire,tt,odo){
  if(!tire||!tire.serial||!tt)return null;
  const rc=Math.min(tire.recapCount||0,RF.length-1),f=RF[rc];
  return tt.recapKm*f-Math.max(0,(odo||0)-(tire.kmInstalled||0));
}
function calcCPK(tire,odo){
  if(!tire||!tire.serial)return null;
  const km=Math.max(1,(odo||0)-(tire.kmInstalled||0));
  const cost=(tire.purchaseCost||0)+(tire.recapCostList||[]).reduce((s,c)=>s+c,0);
  return cost?cost/km*1000:null;
}
function wearRate(ms){
  if(!ms||ms.length<2)return null;
  const s=[...ms].sort((a,b)=>a.km-b.km),f=s[0],l=s[s.length-1],d=l.km-f.km;
  return d<500?null:(f.mm-l.mm)/d;
}
function predKm(ms,lim){
  const r=wearRate(ms);if(!r||r<=0)return null;
  const l=[...ms].sort((a,b)=>b.km-a.km)[0];
  return l.mm<=lim?0:Math.round((l.mm-lim)/r);
}
function sst(mm){return mm==null?"empty":mm<=SULCO_RECAP?"critical":mm<=SULCO_WARN?"warning":"ok";}
const ssC={empty:"#8b96b8",ok:C.green,warning:C.yellow,critical:C.red};
function routeScore(r){if(!r)return 10;const s=10-((r.slopeLevel==="high"?3:r.slopeLevel==="medium"?1.5:0)+(r.curveLevel==="high"?2:r.curveLevel==="medium"?1:0)+(r.trafficLevel==="high"?1.5:r.trafficLevel==="medium"?.5:0)+(10-r.conservationScore)*.3);return Math.max(1,Math.round(s*10)/10);}
function routeWear(r){return r?2-routeScore(r)/10:1;}
function fStats(v,templates,tireTypes){
  const tmpl=templates.find(t=>t.id===v.templateId)||{positions:[]};
  const act=tmpl.positions.filter(p=>p.t!=="ESP");
  return{
    crit:act.filter(p=>gts(v.tires&&v.tires[p.id],getTT(tireTypes,p.t),v.odometer)==="critical").length,
    warn:act.filter(p=>gts(v.tires&&v.tires[p.id],getTT(tireTypes,p.t),v.odometer)==="warning").length,
    ok:act.filter(p=>gts(v.tires&&v.tires[p.id],getTT(tireTypes,p.t),v.odometer)==="ok").length,
  };
}
function getAlerts(fleet,templates,tireTypes,sulcoData){
  const a=[];
  fleet.forEach(v=>{
    const tmpl=templates.find(t=>t.id===v.templateId);if(!tmpl)return;
    tmpl.positions.forEach(p=>{
      if(p.t==="ESP")return;
      const tire=v.tires&&v.tires[p.id];if(!tire||!tire.serial)return;
      const tt=getTT(tireTypes,p.t),kl=gkl(tire,tt,v.odometer);
      if(kl!=null&&kl<=WARN_KM)a.push({vehicleId:v.id,plate:v.plate,posId:p.id,pos:p.lbl,tire,kl,sev:kl<=0?"critical":"warning",tt});
      const ms=sulcoData[v.id+"_"+p.id];
      if(ms&&ms.length>0){const ls=[...ms].sort((a,b)=>b.km-a.km)[0];if(ls.mm<=SULCO_RECAP&&!a.find(x=>x.vehicleId===v.id&&x.posId===p.id&&x.isSulco))a.push({vehicleId:v.id,plate:v.plate,posId:p.id,pos:p.lbl,tire,kl:0,sev:"critical",sulco:ls.mm,isSulco:true});}
    });
  });
  return a.sort((a,b)=>a.kl-b.kl);
}

function SulcoChart({ms}){

  {id:"pv1",cat:"Visual",lbl:"Inspeção visual pós-chegada"},

// ── MODAL DE VIAGEM ──────────────────────────────────────────────────────────
function ViagemModal({initial,route,fleet,templates,tireTypes,osList,onSave,onClose,onSaveOS}){
  const vehsRota=fleet.filter(v=>v.routeId===route.id);
  const today_=today();
  const [f,sf]=useState(initial||{
    companyId:route.companyId,routeId:route.id,
    vehicleId:vehsRota[0]?.id||"",
    date:today_,driver:"",
    odoStart:vehsRota[0]?.odometer||0,odoEnd:0,
    status:"planejada",
    checkPre:{},checkPos:{},notes:"",osGeradas:[]
  });
  const s=(k,v)=>sf(x=>({...x,[k]:v}));
  const selV=fleet.find(v=>v.id===f.vehicleId);
  const kmPercorrido=f.odoEnd>f.odoStart?f.odoEnd-f.odoStart:null;
  const wm=routeWear(route);

  function gerarOS(){
    if(!selV||!f.odoEnd||f.odoEnd<=f.odoStart)return[];
    const tmpl=templates.find(t=>t.id===selV.templateId);
    if(!tmpl)return[];
    const osGeradas=[];
    const wearFactor=wm;
    const odoFinal=f.odoEnd;
    tmpl.positions.filter(p=>p.t!=="ESP").forEach(p=>{
      const tire=selV.tires&&selV.tires[p.id];
      if(!tire)return;
      const tt=getTT(tireTypes,p.t);
      const kmRodados=odoFinal-tire.kmInstalled;
      const limiteRecap=tt.recapKm||100000;
      const pct=kmRodados/limiteRecap;
      const pctComFator=kmRodados/(limiteRecap/wearFactor);
      let tipo=null,prioridade=null,desc=null;
      if(pctComFator>=1.0){tipo="recapagem";prioridade="alta";desc="Pneu "+p.id+" atingiu limite de recapagem considerando fator de rota ("+wearFactor.toFixed(2)+"×). Km rodados: "+fmt(kmRodados)+"km.";}
      else if(pctComFator>=0.85){tipo="inspecao";prioridade="alta";desc="Pneu "+p.id+" próximo do limite considerando fator de rota. "+Math.round(pctComFator*100)+"% do ciclo.";}
      else if(pct>=0.9){tipo="inspecao";prioridade="media";desc="Pneu "+p.id+" a "+Math.round(pct*100)+"% do ciclo de vida. Km: "+fmt(kmRodados)+"km / "+fmt(limiteRecap)+"km.";}
      if(tipo){
        const osId=uid();
        osGeradas.push({id:osId,companyId:route.companyId,vehicleId:selV.id,posId:p.id,type:tipo,status:"pendente",priority:prioridade,description:"[Auto-Viagem "+route.name+"] "+desc,cost:0,tech:"",createdAt:today_});
      }
    });
    return osGeradas;
  }

  function handleSave(){
    let osGeradas=[];
    if(f.status==="concluida"&&f.odoEnd>f.odoStart){
      osGeradas=gerarOS();
      if(osGeradas.length>0&&onSaveOS){
        osGeradas.forEach(os=>onSaveOS(os));
      }
    }
    const vgId=initial?.id||uid();
    onSave({...f,id:vgId,osGeradas:osGeradas.map(o=>o.id)});
    onClose();
  }

  const clPrePct=CL_PRE.filter(i=>f.checkPre[i.id]).length;
  const clPosPct=CL_POS.filter(i=>f.checkPos[i.id]).length;
  const statusC={planejada:"#6b7280",em_andamento:C.blue,concluida:C.green,cancelada:C.red};
  const statusL={planejada:"Planejada",em_andamento:"Em Andamento",concluida:"Concluída",cancelada:"Cancelada"};

  return h("div",{className:"card",style:{maxWidth:"520px",width:"100%",maxHeight:"90vh",overflow:"auto"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px",paddingBottom:"11px",borderBottom:"1.5px solid #e8eaf2"}},
      h("div",{style:{fontSize:"17px",fontWeight:"600"}},(initial?"Editar":"Nova")+" Viagem — "+route.name),
      h("button",{style:B.sm(),onClick:onClose},"×")
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"9px",marginBottom:"9px"}},
      h("div",null,h("label",{className:"lbl"},"Veículo"),
        h("select",{value:f.vehicleId,onChange:e=>{const v2=fleet.find(v=>v.id===e.target.value);s("vehicleId",e.target.value);if(v2){s("odoStart",v2.odometer);s("driver",v2.driver||"");}}},
          h("option",{value:""},"— Selecione —"),
          ...vehsRota.map(v=>h("option",{key:v.id,value:v.id},v.plate+(v.driver?" — "+v.driver:"")))
        )
      ),
      h("div",null,h("label",{className:"lbl"},"Data"),h("input",{type:"date",value:f.date,onChange:e=>s("date",e.target.value)}))
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"9px",marginBottom:"9px"}},
      h("div",null,h("label",{className:"lbl"},"Odômetro Saída (km)"),h("input",{type:"number",value:f.odoStart,onChange:e=>s("odoStart",+e.target.value),style:{fontFamily:"monospace"}})),
      h("div",null,h("label",{className:"lbl"},"Odômetro Chegada (km)"),h("input",{type:"number",value:f.odoEnd||"",placeholder:"—",onChange:e=>s("odoEnd",+e.target.value),style:{fontFamily:"monospace",color:f.odoEnd>f.odoStart?C.green:"#8b96b8"}})),
      h("div",null,h("label",{className:"lbl"},"Km Percorrido"),h("div",{style:{padding:"8px 10px",fontFamily:"monospace",fontWeight:"700",fontSize:"16px",color:kmPercorrido?C.blue:"#8b96b8"}},kmPercorrido?fmt(kmPercorrido)+"km":"—"))
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"9px",marginBottom:"9px"}},
      h("div",null,h("label",{className:"lbl"},"Motorista"),h("input",{value:f.driver,onChange:e=>s("driver",e.target.value),placeholder:"Nome"})),
      h("div",null,h("label",{className:"lbl"},"Status"),
        h("select",{value:f.status,onChange:e=>s("status",e.target.value),style:{color:statusC[f.status]}},
          Object.entries(statusL).map(([k,v])=>h("option",{key:k,value:k},v))
        )
      )
    ),
    // Checklist Pré
    h("div",{style:{marginBottom:"9px",background:"#f8faff",borderRadius:"8px",padding:"10px"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"7px"}},
        h("div",{style:{fontSize:"12px",fontWeight:"600",color:"#374151"}},"✅ Checklist Pré-Viagem"),
        h("span",{style:{fontSize:"11px",color:clPrePct===CL_PRE.length?C.green:"#8b96b8",fontWeight:"600"}},clPrePct+"/"+CL_PRE.length+" itens")
      ),
      CL_PRE.map(item=>h("label",{key:item.id,style:{display:"flex",alignItems:"center",gap:"7px",marginBottom:"5px",cursor:"pointer",fontSize:"12px",color:"#374151"}},
        h("input",{type:"checkbox",checked:!!f.checkPre[item.id],onChange:e=>s("checkPre",{...f.checkPre,[item.id]:e.target.checked}),style:{accentColor:C.blue}}),
        h("span",{style:{color:"#6b7280",fontSize:"10px",marginRight:"2px"}},"["+item.cat+"]"),
        item.lbl
      ))
    ),
    // Checklist Pós (só mostra se status != planejada)
    f.status!=="planejada"&&h("div",{style:{marginBottom:"9px",background:"#f0fff4",borderRadius:"8px",padding:"10px"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"7px"}},
        h("div",{style:{fontSize:"12px",fontWeight:"600",color:"#374151"}},"🏁 Checklist Pós-Viagem"),
        h("span",{style:{fontSize:"11px",color:clPosPct===CL_POS.length?C.green:"#8b96b8",fontWeight:"600"}},clPosPct+"/"+CL_POS.length+" itens")
      ),
      CL_POS.map(item=>h("label",{key:item.id,style:{display:"flex",alignItems:"center",gap:"7px",marginBottom:"5px",cursor:"pointer",fontSize:"12px",color:"#374151"}},
        h("input",{type:"checkbox",checked:!!f.checkPos[item.id],onChange:e=>s("checkPos",{...f.checkPos,[item.id]:e.target.checked}),style:{accentColor:C.green}}),
        h("span",{style:{color:"#6b7280",fontSize:"10px",marginRight:"2px"}},"["+item.cat+"]"),
        item.lbl
      ))
    ),
    // Pré-visualização OS que seriam geradas
    f.status==="concluida"&&f.odoEnd>f.odoStart&&(()=>{const osP=gerarOS();return osP.length>0&&h("div",{style:{marginBottom:"9px",background:"#fff8f0",border:"1px solid #f59e0b44",borderRadius:"8px",padding:"10px"}},
      h("div",{style:{fontSize:"12px",fontWeight:"600",color:C.orange,marginBottom:"6px"}},"⚡ "+osP.length+" O.S. serão geradas automaticamente"),
      osP.map((os,i)=>h("div",{key:i,style:{fontSize:"11px",color:"#374151",marginBottom:"4px",padding:"4px 8px",background:"#fff",borderRadius:"4px",borderLeft:"3px solid "+(os.priority==="alta"?C.red:C.yellow)}},
        h("span",{style:{fontFamily:"monospace",fontWeight:"700",marginRight:"6px"}},os.posId),
        h("span",{style:{color:os.priority==="alta"?C.red:C.yellow,fontWeight:"600",marginRight:"6px"}},OS_TYPES[os.type]),
        os.description.slice(0,60)+"..."
      ))
    );})(),
    h("div",{style:{marginBottom:"9px"}},h("label",{className:"lbl"},"Observações"),h("textarea",{value:f.notes,onChange:e=>s("notes",e.target.value),rows:2,placeholder:"Ocorrências, anomalias...",style:{resize:"vertical"}})),
    h("div",{style:{display:"flex",gap:"8px"}},
      h("button",{style:B.g({flex:1}),onClick:onClose},"Cancelar"),
      h("button",{style:B.p({flex:2}),onClick:handleSave},"💾 Salvar Viagem"+(f.status==="concluida"&&gerarOS().length>0?" + "+gerarOS().length+" O.S.":""))
    )
  );
}

// ── HELPER: resize image to base64 ────────────────────────────────────────────
function resizeImg(file,maxPx,qual,cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const r=Math.min(maxPx/img.width,maxPx/img.height,1);
      const c=document.createElement("canvas");
      c.width=Math.round(img.width*r);c.height=Math.round(img.height*r);
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      cb(c.toDataURL("image/jpeg",qual));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function SupabaseConfigScreen({onConfig}){
  const[url,setUrl]=useState(()=>{try{return localStorage.getItem(TM_SU)||'';}catch(e){return '';}});

  async function handleConnect(){
    if(!url||!key){setErr('Preencha URL e Anon Key.');return;}

      const cl=window.supabase.createClient(url.trim(),key.trim());
      const{error}=await cl.from('profiles').select('id').limit(1);

      h('div',{style:{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'8px',padding:'12px',marginBottom:'16px',fontSize:'12px',color:'#166534'}},
        h('strong',null,'Como configurar:'),h('br',null),
        '1. Acesse ',h('strong',null,'app.supabase.com'),' → seu projeto',h('br',null),
        '2. Settings → API → copie a Project URL e a Anon Key',h('br',null),

      ),

      ok&&h('div',{style:{marginBottom:'12px',fontSize:'12px',color:C.green,background:'#10b98115',padding:'8px 12px',borderRadius:'6px'}},'✅ Conexão OK! Redirecionando...'),

// ── SUPABASE LOGIN SCREEN ────────────────────────────────────────────────────
function SupabaseLoginScreen({onLogin,onResetConfig,groups,companies}){
  const[mode,setMode]=useState('login');
  // Campos compartilhados
  const[email,setEmail]=useState('');
  const[pwd,setPwd]=useState('');
  const[name,setName]=useState('');
  const[groupId,setGroupId]=useState('');
  const[companyId,setCompanyId]=useState('');
  const[roleReq,setRoleReq]=useState('motorista');
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');
  const[step,setStep]=useState(1); // registro em 2 passos

  // Empresas filtradas pelo grupo selecionado
  const groupCos=(companies||[]).filter(c=>!groupId||c.groupId===groupId);

  function resetForm(){setEmail('');setPwd('');setName('');setGroupId('');setCompanyId('');setRoleReq('motorista');setErr('');setStep(1);}

  // ── Login email/senha ──
  async function handleLogin(){
    if(!email||!pwd){setErr('Preencha e-mail e senha.');return;}
    setLoading(true);setErr('');
    try{
      const{data,error}=await _supa.auth.signInWithPassword({email:email.trim(),password:pwd});
      if(error)throw error;
      const{data:prof,error:pe}=await _supa.from('profiles').select('*').eq('id',data.user.id).single();
      if(pe||!prof)throw new Error('Perfil não encontrado. Solicite acesso ao administrador.');
      if(prof.status==='pending'){setMode('pending');setLoading(false);return;}
      if(prof.status==='rejected'){setMode('rejected');setLoading(false);return;}
      onLogin({id:data.user.id,email:data.user.email,companyId:prof.company_id,
        role:prof.role,name:prof.name,label:ROLES[prof.role]?.label||prof.role,
        groupId:prof.group_id,status:prof.status});
    }catch(e){
      const m=e.message||'';
      setErr(m.includes('Invalid login')||m.includes('invalid')?'Credenciais inválidas. Verifique e-mail e senha.':m);
    }
    setLoading(false);
  }

  // ── Google OAuth ──
  async function handleGoogle(){
    setErr('');setLoading(true);
    try{
      const{error}=await _supa.auth.signInWithOAuth({provider:'google',
        options:{redirectTo:window.location.href,queryParams:{access_type:'offline',prompt:'consent'}}});
      if(error){
        if(error.message&&(error.message.includes('not enabled')||error.message.includes('validation_failed')||error.message.includes('Unsupported provider'))){
          setErr('Google OAuth não está configurado neste projeto Supabase. Acesse: Supabase Dashboard → Authentication → Providers → Google para ativar. Use e-mail e senha por enquanto.');
        } else {
          setErr('Erro Google: '+error.message);
        }
        setLoading(false);return;
      }
    }catch(e){
      const msg=e.message||'';
      if(msg.includes('not enabled')||msg.includes('validation_failed')||msg.includes('Unsupported')){
        setErr('Google OAuth não configurado. Acesse Supabase Dashboard → Authentication → Providers → Google para ativar.');
      } else {
        setErr('Erro Google: '+msg);
      }
    }
    setLoading(false);
  }

  // ── Registro ──
  async function handleRegister(){
    if(!name||!email||!pwd||!groupId||!companyId){setErr('Preencha todos os campos obrigatórios.');return;}
    if(pwd.length<6){setErr('Senha com mínimo de 6 caracteres.');return;}
    setLoading(true);setErr('');
    try{
      const{data,error}=await _supa.auth.signUp({email:email.trim(),password:pwd,
        options:{data:{name,group_id:groupId,company_id:companyId,role_requested:roleReq}}});
      if(error)throw error;
      await _supa.from('profiles').upsert({
        id:data.user.id,name,role:roleReq,company_id:companyId,
        group_id:groupId,status:'pending',role_requested:roleReq,provider:'email'
      });
      setMode('pending');
    }catch(e){
      setErr(e.message.includes('already registered')?'E-mail já cadastrado. Faça login.':e.message);
    }
    setLoading(false);
  }

  // ── Verificar sessão OAuth ao retornar ──
  React.useEffect(()=>{
    if(!_supa)return;
    _supa.auth.onAuthStateChange(async(event,session)=>{
      if(event==='SIGNED_IN'&&session){
        const{data:prof}=await _supa.from('profiles').select('*').eq('id',session.user.id).single();
        if(!prof||prof.status==='pending'){
          setEmail(session.user.email||'');
          setName(session.user.user_metadata?.full_name||session.user.user_metadata?.name||'');
          if(!prof)setMode('register');else setMode('pending');
          return;
        }
        if(prof.status==='rejected'){setMode('rejected');return;}
        onLogin({id:session.user.id,email:session.user.email,companyId:prof.company_id,

function LoginScreen({users,onLogin}){

  return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"linear-gradient(135deg,#f0f4ff 0%,#e8f0fe 50%,#f5f7fb 100%)",padding:"20px"}},
    h("div",{style:{background:"#fff",border:"1.5px solid #e2e6f3",borderRadius:"16px",padding:"40px",maxWidth:"400px",width:"100%",boxShadow:"0 8px 40px rgba(37,99,235,.08)"}},
      h("div",{style:{textAlign:"center",marginBottom:"32px"}},
        h("div",{style:{width:"64px",height:"64px",background:"linear-gradient(135deg,#16a34a,#2563eb)",borderRadius:"18px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"30px",margin:"0 auto 16px",boxShadow:"0 4px 16px rgba(37,99,235,.2)"}},"🛞"),
        h("div",{style:{fontSize:"22px",fontWeight:"700",marginBottom:"4px",color:"#1a1d2e"}},"TireMaster Pro"),
        h("div",{style:{fontSize:"13px",color:"#6b7280"}},"v"+VER+" · Gestão de Pneus")
      ),
      h("div",{style:{marginBottom:"12px"}},h("label",{className:"lbl"},"E-mail"),h("input",{type:"email",value:email,onChange:e=>setEmail(e.target.value),onKeyDown:e=>e.key==="Enter"&&doLogin(),placeholder:"seu@email.com"})),
      h("div",{style:{marginBottom:"20px"}},h("label",{className:"lbl"},"Senha"),h("input",{type:"password",value:pass,onChange:e=>setPass(e.target.value),onKeyDown:e=>e.key==="Enter"&&doLogin()})),
      err&&h("div",{style:{color:C.red,fontSize:"12px",marginBottom:"12px",textAlign:"center"}},err),
      h("button",{style:B.p({width:"100%",padding:"10px",fontSize:"14px"}),onClick:doLogin},"Entrar"),
      h("div",{style:{marginTop:"24px",paddingTop:"20px",borderTop:"1.5px solid #e8eaf2"}},
        h("div",{style:{fontSize:"11px",color:"#8b96b8",textAlign:"center",marginBottom:"10px"}},"Acesso rápido (demo)"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px"}},users.slice(0,4).map(u=>h("button",{key:u.id,style:{...B.g({padding:"8px 10px",fontSize:"11px",textAlign:"left"}),borderRadius:"8px"},onClick:()=>onLogin(u)},h("div",{style:{fontWeight:"700",fontSize:"12px",color:"#1a1d2e"}},u.name),h("div",{style:{color:"#6b7280",fontSize:"10px",marginTop:"2px"}},(ROLES[u.role]||{label:u.role}).label))))
      )
    )
  );
}

  const today=new Date();const dow=today.getDay();
  const monday=new Date(today);monday.setDate(today.getDate()-(dow===0?6:dow-1));
  return Array.from({length:5},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d.toISOString().slice(0,10);});
};

// ── AGENDA TAB ────────────────────────────────────────────────────────────────
function AgendaTab({user,agenda,setAgenda,fleet,customRoles,users,serviceTypes,companies}){
  // ── Regras de acesso da agenda ───────────────────────────────────────────────
  // gestor, admin, super_admin → vêem a agenda de TODOS os perfis da empresa
  // borracheiro, mecânico e custom com agenda → vêem SOMENTE a própria agenda
  const canSeeAll=["super_admin","admin","gestor"].includes(user.role);
  const isProfissional=["borracheiro","mecanico"].includes(user.role)||
    (!canSeeAll&&user.role!=="motorista");
  const myRole=user.role;

  // Filtro por empresa — nunca mostra tarefas de outra empresa
  const isHolding=user.role==="super_admin"&&!user.companyId;
  const myFleet=isHolding?fleet:fleet.filter(v=>v.companyId===user.companyId);
  const myVehicleIds=new Set(myFleet.map(v=>v.id));

  // Perfis visíveis nas tabs
  const allAgRoles={
    borracheiro:{label:"Borracheiro",color:"#f97316"},
    mecanico:{label:"Mecânico",color:C.orange},
    ...Object.fromEntries((customRoles||[]).filter(r=>r.perms&&r.perms.agenda)
      .map(r=>[r.key,{label:r.label,color:r.color||"#6b7280"}]))
  };
  // Profissional: vê só o próprio perfil; gestor+: vê todos
  const visibleRoles=canSeeAll
    ?allAgRoles
    :{[myRole]:allAgRoles[myRole]||{label:user.role,color:"#6b7280"}};

  const [agendaRole,setAgendaRole]=useState(
    canSeeAll?"borracheiro":myRole
  );
  // Use serviceTypes from params, fallback to built-in
  const agSvcTypes=(serviceTypes&&serviceTypes.length>0)?serviceTypes.filter(s=>s.ativo):Object.entries({calibragem:"Calibragem",inspecao:"Inspeção",rodizio:"Rodízio",recapagem:"Recapagem",troca:"Troca",alinhamento:"Alinhamento",balanceamento:"Balanceamento",outro:"Outro"}).map(([k,l])=>({key:k,label:l,icon:"🔧",tempoMin:30,custoPorHora:120}));
  const [weekDates]=useState(getWeekDates);
  const [selTask,setSelTask]=useState(null);
  const [modal,setModal]=useState(false);
  const [formTask,setFormTask]=useState(null);
  const typeColors={calibragem:C.blue,troca:C.red,inspecao:C.green,rodizio:C.purple,recapagem:C.orange,alinhamento:"#22d3ee",balanceamento:"#f472b6",outro:"#94a3b8"};
  // typeIcons mantido para compatibilidade
  const typeIcons=Object.fromEntries(agSvcTypes.map(s=>[s.key,s.icon||"🔧"]));
  const priColors={alta:C.red,media:C.yellow,baixa:"#6b7280"};
  const stColors={pendente:C.yellow,em_andamento:C.blue,concluida:C.green};
  const stLabels={pendente:"Pendente",em_andamento:"Em Andamento",concluida:"Concluída"};
  const sv=(k,v)=>setFormTask(x=>({...x,[k]:v}));
  const SLOT_NAMES=["10:00 – 11:00","11:00 – 12:00","13:30 – 14:30","14:30 – 15:30","15:30 – 16:00"];
  // Agenda filtrada:
  // 1. Sempre pela empresa (nunca vaza para outra empresa)
  // 2. Profissional: só tarefas atribuídas a ele (userId ou role+vehicle)
  const companyAgenda=isHolding
    ? agenda
    : agenda.filter(t=>
        t.companyId===user.companyId ||
        (!t.companyId&&(!t.vehicleId||myVehicleIds.has(t.vehicleId)))
      );
  const roleTasks=companyAgenda.filter(t=>{
    if(t.role!==agendaRole)return false;
    // Profissional vê só suas tarefas
    if(isProfissional){
      return t.userId===user.id ||  // atribuída diretamente
             t.role===user.role;    // do mesmo perfil
    }
    return true; // gestor/admin vê todas do perfil selecionado
  });
  const stats={pendente:roleTasks.filter(t=>t.status==="pendente").length,em_andamento:roleTasks.filter(t=>t.status==="em_andamento").length,concluida:roleTasks.filter(t=>t.status==="concluida").length};
  const today2=new Date().toISOString().slice(0,10);
  function openNew(date,slot){
    setFormTask({id:null,role:agendaRole,date,slot,title:"",type:"calibragem",vehicle:"",priority:"media",status:"pendente",notes:""});
    setModal(true);
  }
  function saveTask(f){
    if(!f.title)return;
    const task={...f,id:f.id||uid(),
      userId:f.techId||f.userId||user.id,
      companyId:f.companyId||user.companyId,
      createdBy:f.createdBy||user.id,
      techId:f.techId||"",
      techName:f.techName||f.tech||""};
    if(f.id){setAgenda(agenda.map(t=>t.id===f.id?task:t));}
    else{setAgenda([...agenda,task]);}
    setModal(false);setSelTask(null);
  }
  function delTask(id){if(confirm("Remover tarefa?")){setAgenda(agenda.filter(t=>t.id!==id));setSelTask(null);}}
  function cycleStatus(task){
    const order=["pendente","em_andamento","concluida"];
    const ni=(order.indexOf(task.status)+1)%3;
    setAgenda(agenda.map(t=>t.id===task.id?{...t,status:order[ni]}:t));
  }
  const fmt2=d=>{if(!d)return"";const p=d.split("-");return p[2]+"/"+p[1];};
  const isToday=d=>d===today2;
  return h("div",null,
    modal&&formTask&&h(Overlay,null,
      h("div",{className:"card",style:{maxWidth:"420px",width:"100%"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px",paddingBottom:"11px",borderBottom:"1px solid #30363d"}},
          h("div",{style:{fontSize:"16px",fontWeight:"600"}},formTask.id?"Editar Tarefa":"Nova Tarefa"),
          h("button",{style:B.sm(),onClick:()=>setModal(false)},"×")
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"9px",marginBottom:"9px"}},
          h("div",null,h("label",{className:"lbl"},"Dia"),h("select",{value:formTask.date,onChange:e=>sv("date",e.target.value)},weekDates.map((d,i)=>h("option",{key:d,value:d},DIAS_SEMANA[i]+" "+fmt2(d))))),
          h("div",null,h("label",{className:"lbl"},"Horário"),h("select",{value:formTask.slot,onChange:e=>sv("slot",+e.target.value)},SLOT_NAMES.map((s,i)=>h("option",{key:i,value:i},s))))
        ),
        h("div",{style:{marginBottom:"9px"}},h("label",{className:"lbl"},"Título da Tarefa"),h("input",{value:formTask.title,onChange:e=>sv("title",e.target.value),placeholder:"Descrição da tarefa"})),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"9px",marginBottom:"9px"}},
          h("div",null,h("label",{className:"lbl"},"Tipo de Serviço"),
          h("select",{value:formTask.type,onChange:e=>{
            const st=agSvcTypes.find(s=>s.key===e.target.value);
            sv("type",e.target.value);
            if(st)sv("tempoMin",st.tempoMin);
          }},
            agSvcTypes.map(s=>h("option",{key:s.key,value:s.key},(s.icon||"🔧")+" "+s.label))
          )
        ),
        (()=>{const st=agSvcTypes.find(s=>s.key===formTask.type);return st&&h("div",{style:{fontSize:"11px",color:"#8b96b8",marginTop:"-6px",marginBottom:"6px",paddingLeft:"2px"}},
          "⏱ "+st.tempoMin+"min · R$"+((st.custoPorHora*(st.tempoMin/60)).toFixed(2))+(st.obs?" · "+st.obs:"")
        );})(),
          h("div",null,h("label",{className:"lbl"},"Veículo / Local"),h("input",{value:formTask.vehicle,onChange:e=>sv("vehicle",e.target.value),placeholder:"Placa ou área"}))
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"9px",marginBottom:"9px"}},
          h("div",null,h("label",{className:"lbl"},"Prioridade"),h("select",{value:formTask.priority,onChange:e=>sv("priority",e.target.value)},Object.entries({alta:"Alta",media:"Média",baixa:"Baixa"}).map(([k,v])=>h("option",{key:k,value:k},v)))),
          h("div",null,h("label",{className:"lbl"},"Status"),h("select",{value:formTask.status,onChange:e=>sv("status",e.target.value)},Object.entries(stLabels).map(([k,v])=>h("option",{key:k,value:k},v))))
        ),
        h("div",{style:{marginBottom:"12px"}},
            h("label",{className:"lbl"},"Técnico Responsável"),
            (()=>{
              const agRole=formTask.role||agendaRole;
              const tl=(users||[]).filter(u=>u.role===agRole&&u.active!==false&&u.status!=="rejected"&&(isHolding||u.companyId===user.companyId));
              return tl.length>0
                ?h("select",{value:formTask.techId||"",style:{width:"100%"},
                    onChange:e=>{const u=tl.find(x=>x.id===e.target.value);
                      sv("techId",e.target.value);sv("techName",u?u.name:"");}},
                    h("option",{value:""},"— Responsável —"),
                    tl.map(u=>h("option",{key:u.id,value:u.id},u.name))
                  )
                :h("div",{style:{fontSize:"11px",color:"#8b96b8",padding:"7px",background:"#f8faff",borderRadius:"6px"}},
                    canSeeAll?"Sincronize usuários em Parâmetros → Usuários":"Responsável: "+user.name
                  );
            })()
          ),
          h("div",{style:{marginBottom:"14px"}},h("label",{className:"lbl"},"Observações"),h("textarea",{value:formTask.notes,onChange:e=>sv("notes",e.target.value),rows:2,style:{resize:"vertical"}})),
          h("div",{style:{display:"flex",gap:"8px"}},
            h("button",{style:B.g({flex:1}),onClick:()=>setModal(false)},"Cancelar"),
            formTask.id&&h("button",{style:B.dr(),onClick:()=>{delTask(formTask.id);setModal(false);}},"✕"),
            h("button",{style:B.p({flex:2}),onClick:()=>saveTask(formTask)},"💾 Salvar")
          )
        )
      ),
    // Header
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px",flexWrap:"wrap",gap:"10px"}},
      h("div",null,
        h("div",{style:{fontSize:"17px",fontWeight:"600"}},"📅 Agenda da Semana"),
        h("div",{style:{fontSize:"12px",color:"#6b7280",marginTop:"2px"}},"Horário: 10:00 – 16:00 · Almoço: 12:00 – 13:30 · 5 tarefas/dia")
      ),
      h("div",{style:{display:"flex",gap:"8px"}},
        // Profissional: banner com seu perfil (sem tabs de troca)
        isProfissional
          ?h("div",{style:{fontSize:"13px",fontWeight:"700",padding:"6px 14px",
              borderRadius:"8px",background:"#fff8f0",color:"#f97316",
              border:"1px solid #fed7aa",display:"inline-flex",gap:"8px",alignItems:"center"}},
              h("span",null,"🔧"),
              h("span",null,(ROLES[user.role]?.label||user.role)+" — Minha Agenda")
            )
          // Gestor/admin: tabs para cada perfil
          :Object.entries(visibleRoles).map(([r,def])=>h("button",{
              key:r,onClick:()=>setAgendaRole(r),
